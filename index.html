<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Largest number</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: light dark;
        font-family: "Plus Jakarta Sans", system-ui, sans-serif;
        line-height: 1.5;
        --accent-1: #7c3aed;
        --accent-2: #06b6d4;
        --accent-3: #f472b6;
        --glow-violet: rgba(124, 58, 237, 0.45);
        --glow-cyan: rgba(6, 182, 212, 0.4);
      }

      @keyframes float-blob {
        0%,
        100% {
          transform: translate(0, 0) scale(1);
        }
        33% {
          transform: translate(4%, -3%) scale(1.05);
        }
        66% {
          transform: translate(-3%, 4%) scale(0.98);
        }
      }

      @keyframes shimmer {
        0% {
          background-position: 200% center;
        }
        100% {
          background-position: -200% center;
        }
      }

      @keyframes card-in {
        from {
          opacity: 0;
          transform: translateY(12px) scale(0.98);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1.5rem;
        position: relative;
        overflow-x: hidden;
        background: linear-gradient(
          145deg,
          #f0f4ff 0%,
          #fdf2f8 40%,
          #ecfeff 100%
        );
      }

      body::before,
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
      }

      body::before {
        background: radial-gradient(
            ellipse 80% 55% at 85% 10%,
            rgba(167, 139, 250, 0.55),
            transparent 55%
          ),
          radial-gradient(
            ellipse 70% 50% at 5% 85%,
            rgba(34, 211, 238, 0.45),
            transparent 50%
          ),
          radial-gradient(
            ellipse 50% 40% at 50% 50%,
            rgba(244, 114, 182, 0.2),
            transparent 60%
          );
        animation: float-blob 22s ease-in-out infinite;
      }

      body::after {
        background-image: radial-gradient(
          circle at center,
          rgba(255, 255, 255, 0.12) 1px,
          transparent 1px
        );
        background-size: 24px 24px;
        opacity: 0.35;
        mask-image: radial-gradient(
          ellipse 90% 80% at 50% 50%,
          black 20%,
          transparent 75%
        );
      }

      @media (prefers-color-scheme: dark) {
        body {
          background: linear-gradient(
            155deg,
            #0f0a1a 0%,
            #0c1222 45%,
            #041c1f 100%
          );
        }
        body::before {
          background: radial-gradient(
              ellipse 75% 50% at 80% 5%,
              rgba(139, 92, 246, 0.35),
              transparent 55%
            ),
            radial-gradient(
              ellipse 65% 45% at 10% 90%,
              rgba(6, 182, 212, 0.25),
              transparent 50%
            ),
            radial-gradient(
              ellipse 45% 35% at 45% 45%,
              rgba(236, 72, 153, 0.12),
              transparent 55%
            );
        }
        body::after {
          opacity: 0.2;
        }
      }

      @keyframes rainbow-flow {
        0% {
          background-position: 0% center;
        }
        100% {
          background-position: 200% center;
        }
      }

      @keyframes popup-backdrop-in {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      @keyframes popup-card-in {
        0% {
          opacity: 0;
          transform: scale(0.72) rotate(-6deg);
        }
        55% {
          opacity: 1;
          transform: scale(1.08) rotate(2deg);
        }
        100% {
          opacity: 1;
          transform: scale(1) rotate(0);
        }
      }

      @keyframes mega-bounce {
        0%,
        100% {
          transform: scale(1) rotate(-1deg);
        }
        50% {
          transform: scale(1.06) rotate(1deg);
        }
      }

      @keyframes spin-slow {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes spin-reverse {
        from {
          transform: rotate(360deg);
        }
        to {
          transform: rotate(0deg);
        }
      }

      @keyframes burst-spin {
        from {
          transform: translate(-50%, -50%) rotate(0deg);
        }
        to {
          transform: translate(-50%, -50%) rotate(360deg);
        }
      }

      @keyframes screen-pulse {
        0% {
          opacity: 0;
        }
        15% {
          opacity: 0.45;
        }
        100% {
          opacity: 0;
        }
      }

      @keyframes sparkle-float {
        0%,
        100% {
          opacity: 0.35;
          transform: translate(-50%, -50%) scale(0.75);
        }
        50% {
          opacity: 1;
          transform: translate(-50%, -50%) scale(1.25);
        }
      }

      @keyframes number-pulse-glow {
        0%,
        100% {
          filter: drop-shadow(0 0 20px rgba(236, 72, 153, 0.9))
            drop-shadow(0 0 40px rgba(59, 130, 246, 0.55))
            drop-shadow(0 0 60px rgba(234, 179, 8, 0.35));
        }
        50% {
          filter: drop-shadow(0 0 28px rgba(34, 211, 238, 0.95))
            drop-shadow(0 0 48px rgba(168, 85, 247, 0.6))
            drop-shadow(0 0 72px rgba(251, 113, 133, 0.45));
        }
      }

      .result-popup {
        position: fixed;
        inset: 0;
        z-index: 100;
        display: grid;
        place-items: center;
        padding: 1rem;
        pointer-events: none;
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.25s ease, visibility 0.25s;
      }

      .result-popup::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 3;
        background: radial-gradient(
          circle at 50% 45%,
          rgba(255, 255, 255, 0.55) 0%,
          rgba(251, 191, 36, 0.2) 25%,
          transparent 55%
        );
        opacity: 0;
      }

      .result-popup.is-open::after {
        animation: screen-pulse 0.9s ease-out forwards;
      }

      .result-popup.is-open {
        pointer-events: auto;
        opacity: 1;
        visibility: visible;
      }

      .result-popup__scrim {
        position: absolute;
        inset: 0;
        cursor: pointer;
        z-index: 0;
        background: radial-gradient(
            ellipse 120% 100% at 50% 80%,
            rgba(15, 23, 42, 0.25),
            rgba(15, 23, 42, 0.72)
          ),
          linear-gradient(
            135deg,
            rgba(124, 58, 237, 0.35),
            rgba(6, 182, 212, 0.25),
            rgba(236, 72, 153, 0.3)
          );
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        opacity: 0;
      }

      .result-popup__confetti {
        position: absolute;
        inset: 0;
        z-index: 1;
        width: 100%;
        height: 100%;
        pointer-events: none;
        display: block;
      }

      .result-popup__halo {
        position: absolute;
        inset: 0;
        z-index: 1;
        pointer-events: none;
        display: grid;
        place-items: center;
      }

      .result-popup__halo-ring {
        position: absolute;
        margin: auto;
        inset: 0;
        border-radius: 50%;
        border-style: solid;
        border-width: 5px;
        border-color: #ef4444 #eab308 #22c55e #06b6d4 #3b82f6 #a855f7 #ec4899 #ef4444;
        opacity: 0.85;
        filter: drop-shadow(0 0 12px rgba(236, 72, 153, 0.6));
      }

      .result-popup__halo-ring:nth-child(1) {
        width: min(140vmin, 900px);
        height: min(140vmin, 900px);
        animation: spin-slow 14s linear infinite;
      }

      .result-popup__halo-ring:nth-child(2) {
        width: min(110vmin, 720px);
        height: min(110vmin, 720px);
        border-width: 4px;
        opacity: 0.65;
        animation: spin-reverse 11s linear infinite;
      }

      .result-popup__halo-ring:nth-child(3) {
        width: min(85vmin, 560px);
        height: min(85vmin, 560px);
        border-width: 3px;
        opacity: 0.5;
        animation: spin-slow 8s linear infinite;
      }

      .result-popup.is-open .result-popup__scrim {
        animation: popup-backdrop-in 0.35s ease forwards;
      }

      .result-popup__dialog {
        position: relative;
        z-index: 2;
        width: min(100%, 28rem);
        padding: 2.25rem 1.85rem 1.85rem;
        text-align: center;
        border-radius: 28px;
        overflow: hidden;
        background: linear-gradient(
          160deg,
          rgba(255, 255, 255, 0.95),
          rgba(250, 245, 255, 0.92)
        );
        border: 2px solid transparent;
        background-clip: padding-box;
        box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.5) inset,
          0 0 80px rgba(124, 58, 237, 0.5),
          0 0 140px rgba(236, 72, 153, 0.25),
          0 0 100px rgba(6, 182, 212, 0.35),
          0 24px 48px rgba(0, 0, 0, 0.2);
        transform: scale(0.9);
        opacity: 0;
      }

      .result-popup__burst {
        position: absolute;
        left: 50%;
        top: 42%;
        width: 180%;
        height: 180%;
        translate: -50% -50%;
        z-index: -1;
        pointer-events: none;
        background: repeating-conic-gradient(
          from 0deg at 50% 50%,
          transparent 0deg 6deg,
          rgba(255, 255, 255, 0.22) 6deg 7deg,
          transparent 7deg 14deg
        );
        opacity: 0.55;
        animation: burst-spin 12s linear infinite;
      }

      .result-popup__sparkles {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        overflow: visible;
      }

      .result-popup__sparkle {
        position: absolute;
        width: 9px;
        height: 9px;
        border-radius: 50%;
        pointer-events: none;
        box-shadow: 0 0 14px 4px currentColor;
        transform: translate(-50%, -50%);
        animation: sparkle-float 1.35s ease-in-out infinite;
        animation-delay: var(--d, 0s);
      }

      .result-popup__inner {
        position: relative;
        z-index: 1;
      }

      .result-popup__dialog::before {
        content: "";
        position: absolute;
        inset: -3px;
        border-radius: 30px;
        z-index: -1;
        background: linear-gradient(
          120deg,
          #ef4444,
          #f97316,
          #eab308,
          #22c55e,
          #06b6d4,
          #3b82f6,
          #a855f7,
          #ec4899,
          #ef4444
        );
        background-size: 300% 300%;
        animation: rainbow-flow 4s linear infinite;
      }

      @media (prefers-color-scheme: dark) {
        .result-popup__dialog {
          background: linear-gradient(
            165deg,
            rgba(30, 27, 50, 0.96),
            rgba(15, 23, 42, 0.94)
          );
          box-shadow: 0 0 0 1px rgba(167, 139, 250, 0.25) inset,
            0 0 80px rgba(139, 92, 246, 0.35),
            0 0 120px rgba(6, 182, 212, 0.15),
            0 28px 56px rgba(0, 0, 0, 0.5);
        }
      }

      .result-popup.is-open .result-popup__dialog {
        animation: popup-card-in 0.65s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      }

      .result-popup__heading {
        margin: 0 0 0.5rem;
        font-size: 1.05rem;
        font-weight: 800;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        background: linear-gradient(
          90deg,
          #dc2626,
          #ea580c,
          #ca8a04,
          #16a34a,
          #0891b2,
          #2563eb,
          #9333ea,
          #db2777,
          #dc2626
        );
        background-size: 200% auto;
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        animation: rainbow-flow 3s linear infinite;
        filter: drop-shadow(0 0 8px rgba(168, 85, 247, 0.5));
      }

      .result-popup__number {
        margin: 0 0 1.25rem;
        font-size: clamp(4rem, 22vw, 9rem);
        font-weight: 800;
        line-height: 1;
        font-variant-numeric: tabular-nums;
        letter-spacing: -0.04em;
        background: linear-gradient(
          95deg,
          #f87171,
          #fb923c,
          #facc15,
          #4ade80,
          #22d3ee,
          #60a5fa,
          #c084fc,
          #f472b6,
          #f87171
        );
        background-size: 250% auto;
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        animation: rainbow-flow 2.2s linear infinite,
          number-pulse-glow 1.6s ease-in-out infinite,
          mega-bounce 1.8s ease-in-out infinite;
        text-shadow: 0 0 40px rgba(255, 255, 255, 0.3);
      }

      .result-popup__btn {
        font: inherit;
        font-weight: 800;
        font-size: 1rem;
        padding: 0.75rem 2rem;
        border: none;
        border-radius: 999px;
        cursor: pointer;
        color: #fff;
        background: linear-gradient(
          120deg,
          #7c3aed,
          #2563eb,
          #0891b2,
          #db2777,
          #eab308
        );
        background-size: 200% auto;
        animation: rainbow-flow 4s linear infinite;
        box-shadow: 0 6px 28px rgba(124, 58, 237, 0.55),
          0 0 24px rgba(236, 72, 153, 0.35);
        transition: transform 0.15s, filter 0.15s;
      }

      .result-popup__btn:hover {
        transform: scale(1.05);
        filter: brightness(1.08);
      }

      .result-popup__btn:focus-visible {
        outline: 3px solid #fff;
        outline-offset: 3px;
      }

      @media (prefers-reduced-motion: reduce) {
        body::before {
          animation: none;
        }
        .card {
          animation: none;
        }
        .btn-check::after {
          animation: none;
        }
        .result-popup::after {
          animation: none !important;
          opacity: 0 !important;
        }
        .result-popup__dialog::before,
        .result-popup__heading,
        .result-popup__number,
        .result-popup__btn {
          animation: none;
        }
        .result-popup__burst,
        .result-popup__halo-ring,
        .result-popup__sparkle {
          animation: none !important;
        }
        .result-popup.is-open .result-popup__dialog {
          animation: none;
          opacity: 1;
          transform: none;
        }
        .result-popup.is-open .result-popup__scrim {
          animation: none;
          opacity: 1;
        }
        .result-popup__number {
          filter: drop-shadow(0 0 16px rgba(168, 85, 247, 0.5));
        }
      }

      .lang-bar {
        position: fixed;
        top: 0.75rem;
        left: 0.75rem;
        z-index: 10;
        display: flex;
        gap: 0.2rem;
        padding: 0.3rem;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.72);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        border: 1px solid rgba(255, 255, 255, 0.85);
        box-shadow: 0 8px 32px rgba(124, 58, 237, 0.12),
          0 0 0 1px rgba(255, 255, 255, 0.5) inset;
      }

      @media (prefers-color-scheme: dark) {
        .lang-bar {
          background: rgba(30, 27, 46, 0.75);
          border-color: rgba(167, 139, 250, 0.25);
          box-shadow: 0 8px 32px rgba(0, 0, 0, 0.45),
            0 0 0 1px rgba(255, 255, 255, 0.06) inset;
        }
      }

      .lang-bar button {
        font: inherit;
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 0.02em;
        padding: 0.4rem 0.65rem;
        border: none;
        border-radius: 999px;
        cursor: pointer;
        background: transparent;
        color: #64748b;
        transition: color 0.2s, background 0.2s, transform 0.15s;
      }

      @media (prefers-color-scheme: dark) {
        .lang-bar button {
          color: #94a3b8;
        }
      }

      .lang-bar button:hover {
        background: rgba(124, 58, 237, 0.1);
        color: #5b21b6;
      }

      @media (prefers-color-scheme: dark) {
        .lang-bar button:hover {
          background: rgba(167, 139, 250, 0.15);
          color: #e9d5ff;
        }
      }

      .lang-bar button[aria-pressed="true"] {
        background: linear-gradient(135deg, #7c3aed, #2563eb);
        color: #fff;
        box-shadow: 0 4px 16px var(--glow-violet);
      }

      @media (prefers-color-scheme: dark) {
        .lang-bar button[aria-pressed="true"] {
          background: linear-gradient(135deg, #a78bfa, #22d3ee);
          color: #0f172a;
          box-shadow: 0 4px 20px rgba(167, 139, 250, 0.35);
        }
      }

      .card {
        position: relative;
        z-index: 1;
        width: min(100%, 24rem);
        padding: 1.75rem 1.65rem;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.78);
        backdrop-filter: blur(20px) saturate(1.4);
        -webkit-backdrop-filter: blur(20px) saturate(1.4);
        border: 1px solid rgba(255, 255, 255, 0.9);
        box-shadow: 0 4px 6px rgba(124, 58, 237, 0.04),
          0 24px 48px -12px rgba(124, 58, 237, 0.18),
          0 0 0 1px rgba(255, 255, 255, 0.6) inset;
        animation: card-in 0.55s ease-out both;
      }

      .card::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        padding: 1px;
        background: linear-gradient(
          135deg,
          rgba(124, 58, 237, 0.45),
          rgba(6, 182, 212, 0.35),
          rgba(244, 114, 182, 0.4)
        );
        -webkit-mask: linear-gradient(#fff 0 0) content-box,
          linear-gradient(#fff 0 0);
        mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        pointer-events: none;
      }

      @media (prefers-color-scheme: dark) {
        .card {
          background: rgba(22, 20, 40, 0.82);
          border-color: rgba(167, 139, 250, 0.2);
          box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2),
            0 28px 56px -16px rgba(0, 0, 0, 0.55),
            0 0 0 1px rgba(255, 255, 255, 0.05) inset;
        }
      }

      .card h1 {
        position: relative;
        font-size: 1.35rem;
        font-weight: 800;
        letter-spacing: -0.03em;
        line-height: 1.25;
        margin: 0 0 1.35rem;
        background: linear-gradient(
          120deg,
          #5b21b6 0%,
          #7c3aed 35%,
          #0891b2 65%,
          #db2777 100%
        );
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      @media (prefers-color-scheme: dark) {
        .card h1 {
          background: linear-gradient(
            120deg,
            #e9d5ff 0%,
            #a78bfa 30%,
            #67e8f9 60%,
            #f9a8d4 100%
          );
          -webkit-background-clip: text;
          background-clip: text;
        }
      }

      label {
        display: block;
        font-size: 0.8125rem;
        font-weight: 600;
        margin-bottom: 0.4rem;
        color: #475569;
        letter-spacing: 0.01em;
      }

      @media (prefers-color-scheme: dark) {
        label {
          color: #cbd5e1;
        }
      }

      .field {
        margin-bottom: 1rem;
        position: relative;
      }

      .field:last-of-type {
        margin-bottom: 0.25rem;
      }

      .field:nth-of-type(1) {
        --field-accent: var(--accent-1);
      }
      .field:nth-of-type(2) {
        --field-accent: var(--accent-2);
      }
      .field:nth-of-type(3) {
        --field-accent: var(--accent-3);
      }

      input[type="number"] {
        width: 100%;
        padding: 0.65rem 0.85rem;
        font-size: 1.05rem;
        font-weight: 600;
        font-variant-numeric: tabular-nums;
        border: 1px solid rgba(148, 163, 184, 0.45);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.85);
        color: #0f172a;
        box-shadow: 0 0 0 3px transparent, 0 2px 8px rgba(15, 23, 42, 0.04);
        transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
      }

      input[type="number"]:hover {
        border-color: color-mix(in srgb, var(--field-accent) 55%, #94a3b8);
      }

      input[type="number"]:focus {
        outline: none;
        border-color: var(--field-accent);
        box-shadow: 0 0 0 3px color-mix(in srgb, var(--field-accent) 28%, transparent),
          0 4px 16px color-mix(in srgb, var(--field-accent) 15%, transparent);
        transform: translateY(-1px);
      }

      @media (prefers-color-scheme: dark) {
        input[type="number"] {
          border-color: rgba(148, 163, 184, 0.25);
          background: rgba(15, 23, 42, 0.55);
          color: #f1f5f9;
        }
      }

      .btn-check {
        display: block;
        width: 100%;
        margin-top: 1.1rem;
        padding: 0.75rem 1rem;
        font: inherit;
        font-size: 0.9375rem;
        font-weight: 800;
        letter-spacing: 0.02em;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        color: #fff;
        position: relative;
        overflow: hidden;
        background: linear-gradient(120deg, #7c3aed, #4f46e5, #0891b2, #db2777);
        background-size: 200% auto;
        box-shadow: 0 8px 28px var(--glow-violet), 0 4px 12px var(--glow-cyan);
        transition: transform 0.2s, box-shadow 0.25s, filter 0.2s;
      }

      .btn-check::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          110deg,
          transparent 0%,
          rgba(255, 255, 255, 0.35) 45%,
          transparent 90%
        );
        background-size: 200% 100%;
        animation: shimmer 2.8s ease-in-out infinite;
        pointer-events: none;
      }

      .btn-check:hover {
        transform: translateY(-2px) scale(1.01);
        filter: brightness(1.06);
        box-shadow: 0 12px 36px rgba(124, 58, 237, 0.4),
          0 6px 20px rgba(6, 182, 212, 0.25);
      }

      .btn-check:active {
        transform: translateY(0) scale(0.99);
      }

      .btn-check:focus-visible {
        outline: 3px solid rgba(124, 58, 237, 0.55);
        outline-offset: 3px;
      }

      @media (prefers-color-scheme: dark) {
        .btn-check {
          box-shadow: 0 8px 32px rgba(139, 92, 246, 0.35),
            0 4px 16px rgba(6, 182, 212, 0.2);
        }
      }

      #result {
        margin-top: 1.15rem;
        padding: 1rem 1rem 1.05rem;
        border-radius: 14px;
        font-size: 0.98rem;
        font-weight: 600;
        line-height: 1.45;
        color: #475569;
        background: linear-gradient(
          145deg,
          rgba(124, 58, 237, 0.08),
          rgba(6, 182, 212, 0.06)
        );
        border: 1px solid rgba(124, 58, 237, 0.15);
        min-height: 3.25rem;
        display: flex;
        align-items: center;
      }

      @media (prefers-color-scheme: dark) {
        #result {
          color: #cbd5e1;
          background: linear-gradient(
            145deg,
            rgba(124, 58, 237, 0.18),
            rgba(6, 182, 212, 0.12)
          );
          border-color: rgba(167, 139, 250, 0.22);
        }
      }
    </style>
  </head>
  <body>
    <div
      class="lang-bar"
      role="group"
      aria-label="Language"
      data-i18n-aria-label="ariaLang"
    >
      <button type="button" data-lang="en" aria-pressed="false">EN</button>
      <button type="button" data-lang="ko" aria-pressed="false">한</button>
      <button type="button" data-lang="zh" aria-pressed="false">中</button>
    </div>

    <main class="card">
      <h1 data-i18n="heading">Find the largest number</h1>

      <div class="field">
        <label for="n1" data-i18n="label1">1st number</label>
        <input id="n1" type="number" step="any" inputmode="decimal" />
      </div>
      <div class="field">
        <label for="n2" data-i18n="label2">2nd number</label>
        <input id="n2" type="number" step="any" inputmode="decimal" />
      </div>
      <div class="field">
        <label for="n3" data-i18n="label3">3rd number</label>
        <input id="n3" type="number" step="any" inputmode="decimal" />
      </div>

      <button type="button" id="btn-check" class="btn-check" data-i18n="btnCheck">
        Check result
      </button>

      <p id="result" aria-live="polite"></p>
    </main>

    <div
      id="result-popup"
      class="result-popup"
      role="dialog"
      aria-modal="true"
      aria-labelledby="popup-heading"
      aria-hidden="true"
      hidden
    >
      <div class="result-popup__scrim" data-close-popup aria-hidden="true"></div>
      <canvas id="confetti-canvas" class="result-popup__confetti" aria-hidden="true"></canvas>
      <div class="result-popup__halo" aria-hidden="true">
        <span class="result-popup__halo-ring"></span>
        <span class="result-popup__halo-ring"></span>
        <span class="result-popup__halo-ring"></span>
      </div>
      <div class="result-popup__dialog">
        <div class="result-popup__burst" aria-hidden="true"></div>
        <div id="popup-sparkles" class="result-popup__sparkles" aria-hidden="true"></div>
        <div class="result-popup__inner">
          <p id="popup-heading" class="result-popup__heading" data-i18n="popupLabel">
            Largest number
          </p>
          <p id="popup-number" class="result-popup__number" aria-live="polite"></p>
          <button
            type="button"
            id="popup-close"
            class="result-popup__btn"
            data-i18n="popupClose"
          >
            Got it!
          </button>
        </div>
      </div>
    </div>

    <script>
      const STR = {
        en: {
          pageTitle: "Largest number",
          heading: "Find the largest number",
          label1: "1st number",
          label2: "2nd number",
          label3: "3rd number",
          btnCheck: "Check result",
          resultHint: "Enter three numbers, then tap Check result.",
          resultEmpty: "largest number: —",
          resultInvalid: "largest number: (invalid input)",
          resultPrefix: "largest number: ",
          popupLabel: "Largest number",
          popupClose: "Got it!",
          ariaLang: "Language",
        },
        ko: {
          pageTitle: "가장 큰 수",
          heading: "가장 큰 수 찾기",
          label1: "첫 번째 수",
          label2: "두 번째 수",
          label3: "세 번째 수",
          btnCheck: "결과 확인하기",
          resultHint: "세 수를 입력한 뒤 결과 확인하기를 누르세요.",
          resultEmpty: "가장 큰 수: —",
          resultInvalid: "가장 큰 수: (입력이 올바르지 않음)",
          resultPrefix: "가장 큰 수: ",
          popupLabel: "가장 큰 수",
          popupClose: "확인!",
          ariaLang: "언어",
        },
        zh: {
          pageTitle: "最大数",
          heading: "找出最大的数",
          label1: "第一个数",
          label2: "第二个数",
          label3: "第三个数",
          btnCheck: "查看结果",
          resultHint: "输入三个数字后，点击查看结果。",
          resultEmpty: "最大的数: —",
          resultInvalid: "最大的数: （输入无效）",
          resultPrefix: "最大的数: ",
          popupLabel: "最大的数",
          popupClose: "知道了",
          ariaLang: "语言",
        },
      };

      const n1 = document.getElementById("n1");
      const n2 = document.getElementById("n2");
      const n3 = document.getElementById("n3");
      const btnCheck = document.getElementById("btn-check");
      const result = document.getElementById("result");
      const resultPopup = document.getElementById("result-popup");
      const popupNumber = document.getElementById("popup-number");
      const popupClose = document.getElementById("popup-close");
      const langBar = document.querySelector(".lang-bar");
      const langButtons = langBar.querySelectorAll("[data-lang]");

      const LANG_KEY = "largest-number-lang";
      const supported = ["en", "ko", "zh"];

      function detectInitialLang() {
        const saved = localStorage.getItem(LANG_KEY);
        if (saved && supported.includes(saved)) return saved;
        const nav = (navigator.language || "en").toLowerCase();
        if (nav.startsWith("ko")) return "ko";
        if (nav.startsWith("zh")) return "zh";
        return "en";
      }

      let currentLang = detectInitialLang();
      let needsRecheck = true;

      function t(key) {
        return STR[currentLang][key] ?? STR.en[key];
      }

      function applyStaticStrings() {
        document.documentElement.lang =
          currentLang === "ko" ? "ko" : currentLang === "zh" ? "zh-Hans" : "en";
        document.title = t("pageTitle");
        document.querySelectorAll("[data-i18n]").forEach((el) => {
          const key = el.getAttribute("data-i18n");
          if (key && STR[currentLang][key] != null) {
            el.textContent = t(key);
          }
        });
        const ariaKey = langBar.getAttribute("data-i18n-aria-label");
        if (ariaKey) langBar.setAttribute("aria-label", t(ariaKey));
        langButtons.forEach((btn) => {
          btn.setAttribute("aria-pressed", btn.dataset.lang === currentLang);
        });
      }

      function setLang(lang) {
        if (!supported.includes(lang)) return;
        currentLang = lang;
        localStorage.setItem(LANG_KEY, lang);
        applyStaticStrings();
        refreshResult();
      }

      function closeResultPopup() {
        resultPopup.classList.remove("is-open");
        resultPopup.setAttribute("aria-hidden", "true");
        resultPopup.setAttribute("hidden", "");
        document.body.style.overflow = "";
        document.removeEventListener("keydown", onPopupEscape);
      }

      function onPopupEscape(e) {
        if (e.key === "Escape") closeResultPopup();
      }

      function openResultPopup(valueStr) {
        popupNumber.textContent = valueStr;
        resultPopup.removeAttribute("hidden");
        resultPopup.setAttribute("aria-hidden", "false");
        requestAnimationFrame(() => {
          resultPopup.classList.add("is-open");
        });
        document.body.style.overflow = "hidden";
        document.addEventListener("keydown", onPopupEscape);
        popupClose.focus();
      }

      function computeAndShow(options) {
        const showPopup = options && options.showPopup;
        const raw = [n1.value, n2.value, n3.value];
        if (raw.some((s) => s.trim() === "")) {
          result.textContent = t("resultEmpty");
          return;
        }
        const nums = raw.map((s) => Number(s));
        if (nums.some((n) => Number.isNaN(n))) {
          result.textContent = t("resultInvalid");
          return;
        }
        const largest = Math.max(nums[0], nums[1], nums[2]);
        const valueStr = String(largest);
        result.textContent = t("resultPrefix") + valueStr;
        if (showPopup) openResultPopup(valueStr);
      }

      function refreshResult() {
        if (needsRecheck) {
          result.textContent = t("resultHint");
        } else {
          computeAndShow();
        }
      }

      langButtons.forEach((btn) => {
        btn.addEventListener("click", () => setLang(btn.dataset.lang));
      });

      btnCheck.addEventListener("click", () => {
        needsRecheck = false;
        computeAndShow({ showPopup: true });
      });

      popupClose.addEventListener("click", closeResultPopup);
      resultPopup.querySelectorAll("[data-close-popup]").forEach((el) => {
        el.addEventListener("click", closeResultPopup);
      });

      applyStaticStrings();
      [n1, n2, n3].forEach((el) =>
        el.addEventListener("input", () => {
          needsRecheck = true;
          result.textContent = t("resultHint");
        })
      );

      refreshResult();
    </script>
  </body>
</html>
