<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>연령 확인</title>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4841070038350664" crossorigin="anonymous"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
  <link rel="stylesheet" href="css/ageverification.css?v=4" />
</head>
<body class="min-h-screen bg-slate-950 text-slate-100 antialiased selection:bg-amber-500/30">
  <div class="pointer-events-none fixed inset-0 overflow-hidden">
    <div class="hero-glow absolute -left-1/4 top-0 h-[28rem] w-[28rem] rounded-full bg-violet-600/20 blur-[100px]"></div>
    <div class="hero-glow absolute -right-1/4 bottom-0 h-[24rem] w-[24rem] rounded-full bg-amber-500/15 blur-[90px]"></div>
  </div>

  <main class="relative z-10 mx-auto flex min-h-screen max-w-lg flex-col items-center justify-center px-6 py-16">
    <div class="mb-10 text-center">
      <div class="mb-4 inline-flex items-center justify-center rounded-2xl border border-white/10 bg-white/5 p-3 shadow-lg shadow-violet-500/10 backdrop-blur">
        <i data-lucide="shield-check" class="h-10 w-10 text-amber-400"></i>
      </div>
      <h1 class="bg-gradient-to-r from-amber-200 via-white to-violet-200 bg-clip-text text-3xl font-bold tracking-tight text-transparent sm:text-4xl">
        연령 확인
      </h1>
      <p class="mt-2 text-sm text-slate-400">나이를 입력한 뒤 아래 버튼을 눌러주세요.</p>
    </div>

    <div class="w-full rounded-3xl border border-white/10 bg-white/[0.04] p-8 shadow-2xl shadow-black/40 backdrop-blur-xl">
      <label for="age-input" class="mb-2 block text-sm font-medium text-slate-300">나이</label>
      <input
        id="age-input"
        type="number"
        inputmode="numeric"
        min="0"
        max="150"
        placeholder="예: 20"
        class="w-full rounded-xl border border-white/10 bg-slate-900/80 px-4 py-3 text-lg text-white outline-none ring-0 transition placeholder:text-slate-500 focus:border-amber-400/50 focus:ring-2 focus:ring-amber-400/20"
      />
      <button
        id="verify-btn"
        type="button"
        class="mt-6 w-full rounded-xl bg-gradient-to-r from-amber-500 to-orange-500 py-3.5 text-base font-semibold text-slate-950 shadow-lg shadow-amber-500/25 transition hover:from-amber-400 hover:to-orange-400 hover:shadow-amber-500/40 active:scale-[0.98]"
      >
        연령 확인
      </button>
    </div>
  </main>

  <div id="cookie-consent-modal" class="cookie-consent-root fixed inset-0 z-[60] hidden items-center justify-center p-4" aria-hidden="true">
    <div class="cookie-consent-backdrop absolute inset-0" data-cookie-dismiss></div>
    <div class="cookie-consent-panel relative w-full max-w-md rounded-2xl border border-white/15 bg-slate-900/95 p-6 shadow-2xl shadow-black/50 backdrop-blur-xl">
      <div class="mb-4 flex items-start gap-3">
        <div class="flex h-11 w-11 shrink-0 items-center justify-center rounded-xl border border-amber-400/30 bg-amber-500/10">
          <i data-lucide="cookie" class="h-6 w-6 text-amber-400"></i>
        </div>
        <div class="min-w-0 text-left">
          <h2 class="text-lg font-semibold text-white">쿠키가 필요합니다</h2>
          <p class="mt-2 text-sm leading-relaxed text-slate-300">
            연령 확인 결과를 보여드리려면 최소한의 쿠키 저장이 필요합니다. 동의하시면 결과 화면으로 이동합니다.
          </p>
        </div>
      </div>
      <div class="mt-6 flex flex-col-reverse gap-2 sm:flex-row sm:justify-end">
        <button type="button" class="cookie-btn-cancel rounded-xl border border-white/10 bg-white/5 px-4 py-2.5 text-sm font-medium text-slate-200 transition hover:bg-white/10" data-cookie-dismiss>
          취소
        </button>
        <button type="button" id="cookie-consent-ok" class="rounded-xl bg-gradient-to-r from-amber-500 to-orange-500 px-4 py-2.5 text-sm font-semibold text-slate-950 shadow-lg shadow-amber-500/20 transition hover:from-amber-400 hover:to-orange-400">
          확인
        </button>
      </div>
    </div>
  </div>

  <div id="fake-captcha-modal" class="fake-captcha-root fixed inset-0 z-[61] hidden items-center justify-center p-4" aria-hidden="true">
    <div class="fake-captcha-backdrop absolute inset-0" data-captcha-dismiss></div>
    <div class="fake-captcha-panel relative w-full max-w-sm rounded-lg border border-slate-600/80 bg-[#fafafa] p-4 text-left text-slate-800 shadow-2xl">
      <p class="mb-3 text-center text-xs font-medium text-slate-500">보안 확인 <span class="text-[10px] font-normal text-slate-400">(연출용)</span></p>
      <div class="fake-captcha-widget relative flex min-h-[4.5rem] items-stretch overflow-hidden rounded border border-slate-300 bg-white shadow-sm">
        <button
          type="button"
          id="fake-captcha-trigger"
          class="fake-captcha-trigger flex flex-1 items-center gap-3 px-3 py-3 text-left transition enabled:hover:bg-slate-50 disabled:cursor-default disabled:opacity-90"
        >
          <span class="fake-captcha-box relative flex h-[1.65rem] w-[1.65rem] shrink-0 items-center justify-center rounded-sm border-2 border-slate-400 bg-white">
            <i data-lucide="check" class="fake-captcha-tick h-4 w-4 text-white opacity-0"></i>
          </span>
          <span class="text-sm font-medium text-slate-700">로봇이 아닙니다</span>
        </button>
        <div class="flex w-[4.25rem] shrink-0 flex-col items-center justify-center border-l border-slate-200 bg-[#fafafa] px-1 py-2">
          <div class="fake-captcha-logo mb-0.5 flex h-8 w-8 items-center justify-center rounded-full bg-gradient-to-br from-blue-500 to-indigo-600 shadow-sm">
            <i data-lucide="shield" class="h-4 w-4 text-white"></i>
          </div>
          <span class="text-[9px] leading-tight text-slate-500">보안</span>
        </div>
        <div id="fake-captcha-processing" class="fake-captcha-processing absolute inset-0 bg-white/92 backdrop-blur-[2px]">
          <i data-lucide="loader-circle" class="fake-captcha-spinner h-8 w-8 animate-spin text-blue-600"></i>
          <span class="text-xs font-medium text-slate-600">확인 중…</span>
        </div>
      </div>
      <p class="mt-2 text-center text-[10px] text-slate-400">이 단계는 실제 봇 검사가 아니라 화면 연출입니다.</p>
    </div>
  </div>

  <div id="result-modal" class="modal-root fixed inset-0 z-50 hidden items-center justify-center p-4" aria-hidden="true">
    <div class="modal-backdrop absolute inset-0 z-[10] cursor-pointer" data-modal-dismiss></div>
    <div class="modal-vignette absolute inset-0 z-[11] pointer-events-none" aria-hidden="true"></div>
    <div class="modal-screen-fx absolute inset-0 z-[12] pointer-events-none overflow-hidden" aria-hidden="true">
      <div class="modal-flash"></div>
      <div class="modal-ripples">
        <span class="modal-ripple"></span>
        <span class="modal-ripple"></span>
        <span class="modal-ripple"></span>
      </div>
      <div class="modal-orbs" aria-hidden="true">
        <span class="modal-orb"></span>
        <span class="modal-orb"></span>
        <span class="modal-orb"></span>
      </div>
    </div>
    <div id="modal-fx-screen" class="modal-fx-screen absolute inset-0 z-[15] pointer-events-none overflow-hidden" aria-hidden="true">
      <div id="modal-confetti" class="confetti-layer confetti-layer--screen"></div>
      <div id="modal-float-fx" class="float-fx-layer"></div>
    </div>
    <div class="modal-panel modal-panel-shell relative z-[20] mx-auto w-full max-w-md rounded-3xl">
      <div class="modal-spin-ring" aria-hidden="true">
        <div class="modal-spin-gradient"></div>
      </div>
      <div class="modal-inner relative overflow-hidden rounded-[1.35rem] px-8 pb-10 pt-12 text-center">
        <div class="modal-rays" aria-hidden="true"></div>
        <div class="modal-sheen" aria-hidden="true"></div>
        <button
          type="button"
          class="modal-close absolute right-4 top-4 rounded-lg p-2 text-white/60 transition hover:bg-white/10 hover:text-white"
          data-modal-dismiss
          aria-label="닫기"
        >
          <i data-lucide="x" class="h-5 w-5"></i>
        </button>

        <div id="modal-icon-wrap" class="mx-auto mb-6 flex h-20 w-20 items-center justify-center rounded-2xl border bg-white/5 backdrop-blur">
          <i id="modal-lucide-icon" data-lucide="sparkles" class="h-10 w-10"></i>
        </div>

        <p id="modal-message" class="modal-title text-2xl font-bold leading-snug sm:text-3xl"></p>
        <p id="modal-sub" class="modal-subline mt-3 text-sm text-white/70"></p>

        <button
          type="button"
          id="modal-ok"
          class="mt-10 w-full rounded-xl py-3 text-base font-semibold transition active:scale-[0.98]"
          data-modal-dismiss
        >
          확인
        </button>
      </div>
    </div>
  </div>

  <script src="js/ageverification.js?v=4"></script>
</body>
</html>
