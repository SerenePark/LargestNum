<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Largest number</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, sans-serif;
        line-height: 1.5;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1.5rem;
        background: #f4f4f5;
      }
      @media (prefers-color-scheme: dark) {
        body {
          background: #18181b;
        }
      }
      main {
        width: min(100%, 22rem);
        padding: 1.5rem;
        border-radius: 12px;
        background: #fff;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      }
      @media (prefers-color-scheme: dark) {
        main {
          background: #27272a;
          box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
        }
      }
      h1 {
        font-size: 1.125rem;
        font-weight: 600;
        margin: 0 0 1rem;
      }
      label {
        display: block;
        font-size: 0.875rem;
        margin-bottom: 0.35rem;
        color: #52525b;
      }
      @media (prefers-color-scheme: dark) {
        label {
          color: #a1a1aa;
        }
      }
      .field {
        margin-bottom: 1rem;
      }
      input[type="number"] {
        width: 100%;
        box-sizing: border-box;
        padding: 0.5rem 0.65rem;
        font-size: 1rem;
        border: 1px solid #d4d4d8;
        border-radius: 8px;
        background: #fafafa;
      }
      @media (prefers-color-scheme: dark) {
        input[type="number"] {
          border-color: #3f3f46;
          background: #18181b;
          color: #fafafa;
        }
      }
      #result {
        margin-top: 1.25rem;
        padding-top: 1rem;
        border-top: 1px solid #e4e4e7;
        font-size: 1rem;
      }
      @media (prefers-color-scheme: dark) {
        #result {
          border-top-color: #3f3f46;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Find the largest number</h1>

      <div class="field">
        <label for="n1">1st number</label>
        <input id="n1" type="number" step="any" inputmode="decimal" />
      </div>
      <div class="field">
        <label for="n2">2nd number</label>
        <input id="n2" type="number" step="any" inputmode="decimal" />
      </div>
      <div class="field">
        <label for="n3">3rd number</label>
        <input id="n3" type="number" step="any" inputmode="decimal" />
      </div>

      <p id="result" aria-live="polite">largest number: —</p>
    </main>

    <script>
      const n1 = document.getElementById("n1");
      const n2 = document.getElementById("n2");
      const n3 = document.getElementById("n3");
      const result = document.getElementById("result");

      function update() {
        const raw = [n1.value, n2.value, n3.value];
        if (raw.some((s) => s.trim() === "")) {
          result.textContent = "largest number: —";
          return;
        }
        const nums = raw.map((s) => Number(s));
        if (nums.some((n) => Number.isNaN(n))) {
          result.textContent = "largest number: (invalid input)";
          return;
        }
        const largest = Math.max(nums[0], nums[1], nums[2]);
        result.textContent = "largest number: " + largest;
      }

      [n1, n2, n3].forEach((el) => el.addEventListener("input", update));
    </script>
  </body>
</html>
