<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Largest number</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, sans-serif;
        line-height: 1.5;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1.5rem;
        background: #f4f4f5;
      }
      .lang-bar {
        position: fixed;
        top: 0.75rem;
        left: 0.75rem;
        z-index: 10;
        display: flex;
        gap: 0.25rem;
        padding: 0.25rem;
        border-radius: 10px;
        background: #fff;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
        border: 1px solid #e4e4e7;
      }
      @media (prefers-color-scheme: dark) {
        .lang-bar {
          background: #27272a;
          border-color: #3f3f46;
          box-shadow: 0 2px 12px rgba(0, 0, 0, 0.35);
        }
      }
      .lang-bar button {
        font: inherit;
        font-size: 0.8125rem;
        font-weight: 500;
        padding: 0.35rem 0.55rem;
        border: none;
        border-radius: 7px;
        cursor: pointer;
        background: transparent;
        color: #52525b;
      }
      @media (prefers-color-scheme: dark) {
        .lang-bar button {
          color: #a1a1aa;
        }
      }
      .lang-bar button:hover {
        background: #f4f4f5;
        color: #18181b;
      }
      @media (prefers-color-scheme: dark) {
        .lang-bar button:hover {
          background: #3f3f46;
          color: #fafafa;
        }
      }
      .lang-bar button[aria-pressed="true"] {
        background: #18181b;
        color: #fafafa;
      }
      @media (prefers-color-scheme: dark) {
        .lang-bar button[aria-pressed="true"] {
          background: #fafafa;
          color: #18181b;
        }
      }
      @media (prefers-color-scheme: dark) {
        body {
          background: #18181b;
        }
      }
      main {
        width: min(100%, 22rem);
        padding: 1.5rem;
        border-radius: 12px;
        background: #fff;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      }
      @media (prefers-color-scheme: dark) {
        main {
          background: #27272a;
          box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
        }
      }
      h1 {
        font-size: 1.125rem;
        font-weight: 600;
        margin: 0 0 1rem;
      }
      label {
        display: block;
        font-size: 0.875rem;
        margin-bottom: 0.35rem;
        color: #52525b;
      }
      @media (prefers-color-scheme: dark) {
        label {
          color: #a1a1aa;
        }
      }
      .field {
        margin-bottom: 1rem;
      }
      input[type="number"] {
        width: 100%;
        box-sizing: border-box;
        padding: 0.5rem 0.65rem;
        font-size: 1rem;
        border: 1px solid #d4d4d8;
        border-radius: 8px;
        background: #fafafa;
      }
      @media (prefers-color-scheme: dark) {
        input[type="number"] {
          border-color: #3f3f46;
          background: #18181b;
          color: #fafafa;
        }
      }
      .btn-check {
        display: block;
        width: 100%;
        margin-top: 0.25rem;
        padding: 0.6rem 0.75rem;
        font: inherit;
        font-size: 0.9375rem;
        font-weight: 600;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        background: #18181b;
        color: #fafafa;
      }
      .btn-check:hover {
        opacity: 0.92;
      }
      @media (prefers-color-scheme: dark) {
        .btn-check {
          background: #fafafa;
          color: #18181b;
        }
      }
      #result {
        margin-top: 1rem;
        padding-top: 1rem;
        border-top: 1px solid #e4e4e7;
        font-size: 1rem;
        color: #52525b;
      }
      @media (prefers-color-scheme: dark) {
        #result {
          border-top-color: #3f3f46;
          color: #a1a1aa;
        }
      }
    </style>
  </head>
  <body>
    <div
      class="lang-bar"
      role="group"
      aria-label="Language"
      data-i18n-aria-label="ariaLang"
    >
      <button type="button" data-lang="en" aria-pressed="false">EN</button>
      <button type="button" data-lang="ko" aria-pressed="false">한</button>
      <button type="button" data-lang="zh" aria-pressed="false">中</button>
    </div>

    <main>
      <h1 data-i18n="heading">Find the largest number</h1>

      <div class="field">
        <label for="n1" data-i18n="label1">1st number</label>
        <input id="n1" type="number" step="any" inputmode="decimal" />
      </div>
      <div class="field">
        <label for="n2" data-i18n="label2">2nd number</label>
        <input id="n2" type="number" step="any" inputmode="decimal" />
      </div>
      <div class="field">
        <label for="n3" data-i18n="label3">3rd number</label>
        <input id="n3" type="number" step="any" inputmode="decimal" />
      </div>

      <button type="button" id="btn-check" class="btn-check" data-i18n="btnCheck">
        Check result
      </button>

      <p id="result" aria-live="polite"></p>
    </main>

    <script>
      const STR = {
        en: {
          pageTitle: "Largest number",
          heading: "Find the largest number",
          label1: "1st number",
          label2: "2nd number",
          label3: "3rd number",
          btnCheck: "Check result",
          resultHint: "Enter three numbers, then tap Check result.",
          resultEmpty: "largest number: —",
          resultInvalid: "largest number: (invalid input)",
          resultPrefix: "largest number: ",
          ariaLang: "Language",
        },
        ko: {
          pageTitle: "가장 큰 수",
          heading: "가장 큰 수 찾기",
          label1: "첫 번째 수",
          label2: "두 번째 수",
          label3: "세 번째 수",
          btnCheck: "결과 확인하기",
          resultHint: "세 수를 입력한 뒤 결과 확인하기를 누르세요.",
          resultEmpty: "가장 큰 수: —",
          resultInvalid: "가장 큰 수: (입력이 올바르지 않음)",
          resultPrefix: "가장 큰 수: ",
          ariaLang: "언어",
        },
        zh: {
          pageTitle: "最大数",
          heading: "找出最大的数",
          label1: "第一个数",
          label2: "第二个数",
          label3: "第三个数",
          btnCheck: "查看结果",
          resultHint: "输入三个数字后，点击查看结果。",
          resultEmpty: "最大的数: —",
          resultInvalid: "最大的数: （输入无效）",
          resultPrefix: "最大的数: ",
          ariaLang: "语言",
        },
      };

      const n1 = document.getElementById("n1");
      const n2 = document.getElementById("n2");
      const n3 = document.getElementById("n3");
      const btnCheck = document.getElementById("btn-check");
      const result = document.getElementById("result");
      const langBar = document.querySelector(".lang-bar");
      const langButtons = langBar.querySelectorAll("[data-lang]");

      const LANG_KEY = "largest-number-lang";
      const supported = ["en", "ko", "zh"];

      function detectInitialLang() {
        const saved = localStorage.getItem(LANG_KEY);
        if (saved && supported.includes(saved)) return saved;
        const nav = (navigator.language || "en").toLowerCase();
        if (nav.startsWith("ko")) return "ko";
        if (nav.startsWith("zh")) return "zh";
        return "en";
      }

      let currentLang = detectInitialLang();
      let needsRecheck = true;

      function t(key) {
        return STR[currentLang][key] ?? STR.en[key];
      }

      function applyStaticStrings() {
        document.documentElement.lang =
          currentLang === "ko" ? "ko" : currentLang === "zh" ? "zh-Hans" : "en";
        document.title = t("pageTitle");
        document.querySelectorAll("[data-i18n]").forEach((el) => {
          const key = el.getAttribute("data-i18n");
          if (key && STR[currentLang][key] != null) {
            el.textContent = t(key);
          }
        });
        const ariaKey = langBar.getAttribute("data-i18n-aria-label");
        if (ariaKey) langBar.setAttribute("aria-label", t(ariaKey));
        langButtons.forEach((btn) => {
          btn.setAttribute("aria-pressed", btn.dataset.lang === currentLang);
        });
      }

      function setLang(lang) {
        if (!supported.includes(lang)) return;
        currentLang = lang;
        localStorage.setItem(LANG_KEY, lang);
        applyStaticStrings();
        refreshResult();
      }

      function computeAndShow() {
        const raw = [n1.value, n2.value, n3.value];
        if (raw.some((s) => s.trim() === "")) {
          result.textContent = t("resultEmpty");
          return;
        }
        const nums = raw.map((s) => Number(s));
        if (nums.some((n) => Number.isNaN(n))) {
          result.textContent = t("resultInvalid");
          return;
        }
        const largest = Math.max(nums[0], nums[1], nums[2]);
        result.textContent = t("resultPrefix") + largest;
      }

      function refreshResult() {
        if (needsRecheck) {
          result.textContent = t("resultHint");
        } else {
          computeAndShow();
        }
      }

      langButtons.forEach((btn) => {
        btn.addEventListener("click", () => setLang(btn.dataset.lang));
      });

      btnCheck.addEventListener("click", () => {
        needsRecheck = false;
        computeAndShow();
      });

      applyStaticStrings();
      [n1, n2, n3].forEach((el) =>
        el.addEventListener("input", () => {
          needsRecheck = true;
          result.textContent = t("resultHint");
        })
      );

      refreshResult();
    </script>
  </body>
</html>
